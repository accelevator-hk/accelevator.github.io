<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>网站更新中</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            color: white;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .message {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }
        .update-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        hr {
            width: 50px;
            margin: 2rem auto;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .footer {
            font-size: 0.875rem;
            opacity: 0.7;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="update-icon">🔄</div>
        <h1>网站更新中</h1>
        <div class="message">
            感谢您访问我们的网站。<br>
            我们正在对网站进行全面升级，敬请期待！
        </div>
        <hr>
        <div class="footer">
            预计近期完成更新<br>
            请稍后再来访问
        </div>
    </div>
</body>
</html>
